name: Weekly DB Backup

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          FILENAME="shapepaint-backup-${TIMESTAMP}.sql.gz"

          # Dump and compress; fail if pg_dump errors
          pg_dump "$DATABASE_URL" --no-owner --no-privileges 2>pg_dump_errors.log | gzip > "$FILENAME"

          # Check for pg_dump errors
          if [ -s pg_dump_errors.log ]; then
            echo "pg_dump errors:"
            cat pg_dump_errors.log
            exit 1
          fi

          # Verify backup is not trivially small (< 1KB likely means empty)
          SIZE=$(stat -c%s "$FILENAME")
          echo "Backup size: $(du -h "$FILENAME" | cut -f1) ($SIZE bytes)"
          if [ "$SIZE" -lt 1024 ]; then
            echo "ERROR: Backup file suspiciously small ($SIZE bytes). Aborting."
            exit 1
          fi

          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          aws s3 cp "$FILENAME" \
            "s3://shapepaint-db-backup/$FILENAME" \
            --endpoint-url "$R2_ENDPOINT_URL"
          echo "Uploaded $FILENAME to R2"
